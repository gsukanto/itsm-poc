name: Deploy

on:
  workflow_dispatch:
    inputs:
      baseName:
        description: 'Base name (e.g. itsm-prod)'
        required: true
      location:
        description: 'Azure region'
        default: 'eastus'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: What-if
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ inputs.baseName }}-rg
          template: infra/main.bicep
          parameters: >-
            baseName=${{ inputs.baseName }}
            sqlAdminLogin=${{ secrets.SQL_ADMIN_LOGIN }}
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
            entraTenantId=${{ secrets.AZURE_TENANT_ID }}
          additionalArguments: --what-if
      - name: Deploy
        if: github.event_name == 'workflow_dispatch'
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ inputs.baseName }}-rg
          template: infra/main.bicep
          parameters: >-
            baseName=${{ inputs.baseName }}
            sqlAdminLogin=${{ secrets.SQL_ADMIN_LOGIN }}
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
            entraTenantId=${{ secrets.AZURE_TENANT_ID }}
